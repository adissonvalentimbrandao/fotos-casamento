<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#212529">
  <title>Fotos do casamento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body data-page="home" class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="/">Fotos do casamento</a>
      <div class="d-flex gap-2">
        <a href="/admin" class="btn btn-outline-light btn-sm">Galeria</a>
        <button type="button" id="btn-refresh" class="btn btn-primary btn-sm">Novo QR Code</button>
      </div>
    </div>
  </nav>

  <main class="container py-4 py-lg-5">
    <div class="row g-4">
      <div class="col-lg-6">
        <div class="card shadow-sm h-100">
          <div class="card-body text-center">
            <h2 class="card-title h5">QR Code</h2>
            <p class="text-muted small mb-3" id="qr-subtitle">Escaneie com a câmera do celular</p>

            <span class="badge mb-3" id="network-badge">Carregando...</span>

            <div class="bg-white border rounded p-3 d-inline-block mb-3" id="qr-wrapper">
              <div class="spinner-border text-secondary" id="qr-loading" role="status">
                <span class="visually-hidden">Carregando...</span>
              </div>
              <img id="qr-image" class="img-fluid d-none" alt="QR Code" style="max-width: 260px;">
            </div>

            <div class="d-flex flex-wrap justify-content-center gap-2 mb-3">
              <button type="button" id="btn-copy-link" class="btn btn-outline-secondary btn-sm d-none">Copiar link</button>
              <a id="open-mobile-link" href="#" class="btn btn-primary btn-sm d-none" target="_blank" rel="noopener">Abrir no celular</a>
            </div>

            <div class="text-start">
              <label class="form-label small text-muted mb-1">Link de captura</label>
              <div id="capture-url" class="small text-break font-monospace bg-light border rounded p-2">—</div>
            </div>

            <div class="text-start mt-3 d-none" id="local-network-box">
              <label class="form-label small text-muted mb-1">Rede local (mesmo Wi-Fi)</label>
              <div id="network-url" class="small text-break font-monospace bg-light border rounded p-2">—</div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h2 class="card-title h5">Instruções</h2>
            <p class="text-muted small mb-3" id="instructions-subtitle">Para os convidados</p>
            <ol class="list-group list-group-numbered list-group-flush" id="instructions-list">
              <li class="list-group-item bg-transparent border-0 px-0">Escaneie o QR Code</li>
              <li class="list-group-item bg-transparent border-0 px-0">Permita o uso da câmera</li>
              <li class="list-group-item bg-transparent border-0 px-0">Tire a foto e confira o preview</li>
              <li class="list-group-item bg-transparent border-0 px-0">Envie a imagem</li>
              <li class="list-group-item bg-transparent border-0 px-0">Veja na <a href="/admin">galeria</a></li>
            </ol>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
