<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Enviar foto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body data-page="capture" class="page-capture">
  <div class="capture-app">
    <header class="capture-topbar">
      <p class="capture-title">Enviar foto</p>
      <p class="capture-subtitle">Toque no círculo para capturar</p>
    </header>

    <div id="toast-camera" class="capture-toast">Abrindo câmera...</div>
    <div id="toast-error" class="capture-toast capture-toast-error hidden"></div>

    <main class="capture-stage">
      <div class="camera-viewport" id="camera-viewport">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" class="hidden"></canvas>
        <img id="preview" class="preview-img hidden" alt="Pré-visualização">
        <div class="camera-frame" id="camera-frame" aria-hidden="true"></div>
      </div>
    </main>

    <footer class="capture-dock" id="dock-camera">
      <button type="button" id="btn-shutter" class="shutter-btn" disabled aria-label="Tirar foto">
        <span class="shutter-inner"></span>
      </button>
    </footer>

    <footer class="capture-dock capture-dock-preview hidden" id="dock-preview">
      <div class="dock-actions">
        <button type="button" id="btn-retake" class="btn-capture btn-capture-muted">Tirar outra</button>
        <button type="button" id="btn-upload" class="btn-capture btn-capture-primary">Enviar foto</button>
      </div>
    </footer>

    <div class="success-screen hidden" id="success-screen">
      <div class="success-card">
        <p class="success-label">Enviado</p>
        <h2>Obrigado</h2>
        <p>Sua foto foi recebida.</p>
      </div>
    </div>
  </div>

  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <p class="loading-text">Enviando...</p>
  </div>

  <script src="/app.js"></script>
</body>
</html>
