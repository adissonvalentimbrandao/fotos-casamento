<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1f2c33">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Enviar foto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body data-page="capture" class="page-capture">
  <div class="capture-app">
    <header class="wa-header">
      <div class="wa-header-main">
        <div class="wa-avatar">+</div>
        <div>
          <h1>Enviar foto</h1>
          <p>Toque no círculo para capturar</p>
        </div>
      </div>
    </header>

    <div id="toast-camera" class="capture-toast">Abrindo câmera...</div>
    <div id="toast-error" class="capture-toast error d-none" role="alert"></div>

    <main class="capture-stage">
      <div class="camera-viewport">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas" class="d-none"></canvas>
        <img id="preview" class="preview-img d-none" alt="Preview">
        <div class="camera-frame" id="camera-frame" aria-hidden="true"></div>
      </div>
    </main>

    <footer class="capture-dock-area">
      <div class="capture-dock" id="dock-camera">
        <button type="button" id="btn-shutter" class="shutter-btn" disabled aria-label="Tirar foto">
          <span class="shutter-inner"></span>
        </button>
      </div>
      <div class="capture-dock capture-dock-preview d-none" id="dock-preview">
        <button type="button" id="btn-retake" class="wa-btn wa-btn-ghost">Tirar outra foto</button>
        <button type="button" id="btn-upload" class="wa-btn wa-btn-green">Enviar foto</button>
      </div>
    </footer>

    <div class="success-screen d-none" id="success-screen">
      <div class="success-check" aria-hidden="true">✓</div>
      <h2>Enviado</h2>
      <p>Sua foto foi recebida. Obrigado!</p>
    </div>
  </div>

  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <p>Enviando...</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
