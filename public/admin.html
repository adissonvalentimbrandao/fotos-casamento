<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#202c33">
  <title>Galeria — Fotos do casamento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body data-page="admin">
  <div class="wa-app">
    <header class="wa-header">
      <div class="wa-header-main">
        <div class="wa-avatar" aria-hidden="true">GL</div>
        <div>
          <h1>Galeria</h1>
          <p>Fotos dos convidados</p>
        </div>
      </div>
      <div class="wa-header-actions">
        <a href="/" class="wa-btn wa-btn-ghost btn-sm">Voltar ao QR Code</a>
        <button type="button" id="btn-download-zip" class="wa-btn wa-btn-ghost btn-sm" disabled>Baixar todas (ZIP)</button>
        <button type="button" id="btn-refresh-photos" class="wa-btn wa-btn-green btn-sm">Atualizar galeria</button>
      </div>
    </header>

    <main class="wa-content">
      <div class="wa-stats">
        <div class="wa-stat">
          <strong id="stat-total">0</strong>
          <span>Total</span>
        </div>
        <div class="wa-stat">
          <strong id="stat-today">0</strong>
          <span>Hoje</span>
        </div>
      </div>

      <section class="wa-panel">
        <div class="wa-panel-head">
          <h2>Mídia</h2>
          <p>Toque na foto para ampliar</p>
        </div>
        <div class="wa-panel-body" style="padding: 4px;">
          <div id="empty-state" class="wa-empty">
            <h3>Nenhuma foto ainda</h3>
            <p>Gere um QR Code na página inicial.</p>
          </div>
          <div class="wa-photos-grid d-none" id="photos-grid"></div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal fade wa-modal" id="photoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title text-light fw-normal" id="photoModalLabel">Foto</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <img id="lightbox-img" src="" alt="">
        </div>
        <div class="modal-footer justify-content-between flex-wrap gap-2">
          <div class="small text-secondary">
            <span id="lightbox-id"></span>
            <span class="mx-2">·</span>
            <span id="lightbox-date"></span>
          </div>
          <div class="d-flex gap-2 flex-wrap">
            <button type="button" class="wa-btn wa-btn-ghost" id="lightbox-prev">Foto anterior</button>
            <button type="button" class="wa-btn wa-btn-ghost" id="lightbox-next">Próxima foto</button>
            <a id="lightbox-download" class="wa-btn wa-btn-green" href="#" download>Baixar esta foto</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
